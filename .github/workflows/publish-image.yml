name: Publish image

# Builds and pushes the container image to GitHub Container Registry:
#   ghcr.io/akav-labs/agentsentry-gateway
# - :latest and :sha-<short> on every push to main
# - :<version> (and :<major>.<minor>) on a v* tag release
#
# Optionally ALSO mirrors to Docker Hub (docker.io/<DOCKERHUB_USERNAME>/agentsentry-gateway)
# — only if the DOCKERHUB_USERNAME + DOCKERHUB_TOKEN repo secrets are set. If they
# aren't, those steps are skipped and the GHCR push is unaffected.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/akav-labs/agentsentry-gateway
  DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags & labels (GHCR)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push (GHCR)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Optional Docker Hub mirror (skipped unless secrets are set) ----
      - name: Log in to Docker Hub
        if: ${{ env.DH_USER != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive tags & labels (Docker Hub)
        if: ${{ env.DH_USER != '' }}
        id: metadh
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/agentsentry-gateway
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push (Docker Hub)
        if: ${{ env.DH_USER != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.metadh.outputs.tags }}
          labels: ${{ steps.metadh.outputs.labels }}
          cache-from: type=gha
